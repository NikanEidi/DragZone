name: CI/CD Pipeline

on:
  push:
    branches: [ UI, main ]
  pull_request:
    branches: [ UI, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build project
      run: npm run build

    - name: Run Jest tests
      run: npm run test:unit

    - name: Run Cypress E2E tests
      run: npm run test:e2e:ci
